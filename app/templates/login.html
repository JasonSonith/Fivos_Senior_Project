<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fivos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="auth-body">
    <div class="auth-shell">
        <div class="auth-card">
            <div class="auth-brand-row">
                <img src="/static/fivos-logo.png" alt="Fivos" class="brand-logo-img" style="background:#f7f9fc; border-radius:5px; padding:5px 10px; height:34px; width:auto;">
                <div>
                    <p class="eyebrow" style="margin-bottom: 6px;">Secure Access</p>
                    <h1 class="auth-title">Sign in to Fivos</h1>
                    <p class="auth-subtitle">
                        Access the dashboard, review queue, validation tools, and admin functions.
                    </p>
                </div>
            </div>

            {% if error %}
            <div class="alert-error">
                <strong>Login failed:</strong> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/auth/login" class="form-grid-modern">
                <input type="hidden" name="csrf_token" value="{{ request.session.csrf_token }}">
                <div class="field">
                    <label for="email">Email</label>
                    <input
                        id="email"
                        name="email"
                        type="email"
                        placeholder="reviewer@fivos.local"
                        value="{{ email }}"
                        required
                    >
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        placeholder="Enter your password"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
