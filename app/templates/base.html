<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fivos Device Data Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="topnav">
        <a href="/" class="topnav-brand">
            <div class="brand-logo">F</div>
            <span class="brand-title">Fivos</span>
        </a>

        <div class="topnav-links">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/harvester" class="nav-link">Harvester</a>
            <a href="/validate" class="nav-link">Validator</a>
            <a href="/gudid" class="nav-link">GUDID Lookup</a>
            {% if current_user and current_user.role == "admin" %}
            <a href="/admin/users" class="nav-link">Users</a>
            {% endif %}
        </div>

        {% if current_user %}
        <div class="topnav-user">
            <div class="user-chip">
                <span class="user-name">{{ current_user.name }}</span>
                <span class="user-role">{{ current_user.role|capitalize }}</span>
            </div>

            <form method="post" action="/auth/logout" style="margin: 0;">
                <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
            </form>
        </div>
        {% endif %}
    </nav>

    <main class="page-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
