services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat
    volumes:
      - harvester_output:/app/harvester/output
      - harvester_logs:/app/harvester/log-files
      - scraper_html:/app/web-scraper/out_html
    depends_on:
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    env_file:
      - ../.env
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ping:1}).ok' | grep -q 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull gemma4:e4b &&
        echo 'Model ready'
      "
    restart: "no"

volumes:
  mongo_data:
  ollama_models:
  harvester_output:
  harvester_logs:
  scraper_html:
