services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - FIVOS_MONGO_URI=mongodb://${MONGO_USERNAME:-fivos}:${MONGO_PASSWORD}@mongo:27017/fivos?authSource=admin
      - OLLAMA_URL=http://ollama:11434/api/chat
    volumes:
      - harvester_output:/app/harvester/output
      - harvester_logs:/app/harvester/log-files
      - scraper_html:/app/web-scraper/out_html
    depends_on:
      mongo:
        condition: service_healthy
      ollama:
        condition: service_started

  mongo:
    image: mongo:7
    ports:
      - "127.0.0.1:27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME:-fivos}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD:?Set MONGO_PASSWORD in .env}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "-u", "$$MONGO_INITDB_ROOT_USERNAME", "-p", "$$MONGO_INITDB_ROOT_PASSWORD", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_started
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull gemma4:latest &&
        ollama pull qwen2.5:7b &&
        ollama pull mistral &&
        echo 'All models ready'
      "
    restart: "no"

volumes:
  mongo_data:
  ollama_models:
  harvester_output:
  harvester_logs:
  scraper_html:
